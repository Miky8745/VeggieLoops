<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VeggieLoops</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    %sveltekit.head%
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; }
      #svelte { height: 100%; }

      :root {
        --sidebar-bg:          #181818;
        --sidebar-text:        #999999;
        --sidebar-hover:       #222222;
        --sidebar-active-bg:   #2A2A2A;
        --sidebar-active-text: #E0E0E0;
        --sidebar-border:      #2C2C2C;
        --explorer-bg:         #1E1E1E;
        --explorer-border:     #2C2C2C;
        --main-bg:             #1A1A1A;
        --main-text:           #D0D0D0;
        --main-text-muted:     #666666;
        --main-muted:          #666666;
        --main-border:         #2C2C2C;
        --accent:              #E07800;
        --accent-hover:        #FF8C00;
        --accent-text:         #ffffff;
        --btn-bg:              #252525;
        --btn-border:          #383838;
        --btn-text:            #BBBBBB;
        --btn-hover:           #2E2E2E;
        --search-bg:           #222222;
        --shadow-sm:           0 1px 3px rgba(0, 0, 0, 0.5);
        --toolbar-green-bg:    #263a30;
      }
    </style>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
